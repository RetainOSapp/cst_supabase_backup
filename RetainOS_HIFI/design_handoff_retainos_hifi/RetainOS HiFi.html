<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RetainOS — Hi-Fi</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="tokens.css" />
<style>
/* ============================ LAYOUT SHELL ============================ */
.app { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }

/* ---- Sidebar ---- */
.sidebar {
  background: var(--navy-800); color: var(--text-on-dark);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
}
.sb-logo { display: flex; align-items: center; gap: 10px; padding: 22px 20px 18px; }
.sb-logo svg { width: 26px; height: 26px; flex: none; }
.sb-logo b { font-size: 19px; font-weight: 700; color: #fff; letter-spacing: -.02em; }
.sb-context { margin: 0 12px 8px; padding: 10px 12px; border-radius: var(--r-md);
  background: rgba(255,255,255,.05); display: flex; align-items: center; gap: 10px; cursor: pointer; }
.sb-context:hover { background: rgba(255,255,255,.09); }
.sb-context .ava { width: 30px; height: 30px; border-radius: var(--r-sm); background: linear-gradient(135deg,#7C5CFC,#59ABF0);
  display: grid; place-items: center; font-size: 12px; font-weight: 700; color: #fff; flex: none; }
.sb-context .meta { line-height: 1.25; overflow: hidden; }
.sb-context .meta small { color: var(--text-on-dark-muted); font-size: 11px; display: block; }
.sb-context .meta span { font-size: 13px; font-weight: 600; color: #fff; }
.sb-context .chev { margin-left: auto; color: var(--text-on-dark-muted); }
.sb-nav { padding: 8px 12px; overflow-y: auto; flex: 1; }
.sb-section { font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
  color: var(--text-on-dark-muted); padding: 14px 12px 6px; font-weight: 600; }
.sb-item { display: flex; align-items: center; gap: 11px; padding: 9px 12px; border-radius: var(--r-md);
  color: var(--text-on-dark-muted); font-size: 13.5px; font-weight: 500; cursor: pointer; border: none; background: none;
  width: 100%; text-align: left; transition: background .12s, color .12s; }
.sb-item svg { width: 18px; height: 18px; flex: none; }
.sb-item:hover { background: rgba(255,255,255,.06); color: #fff; }
.sb-item.active { background: var(--blue-500); color: #fff; }
.sb-item .count { margin-left: auto; background: rgba(255,255,255,.14); color: #fff; font-size: 11px;
  min-width: 18px; height: 18px; border-radius: var(--r-pill); display: grid; place-items: center; padding: 0 5px; }
.sb-item.active .count { background: rgba(255,255,255,.28); }
.sb-foot { border-top: 1px solid rgba(255,255,255,.08); padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
.sb-foot img, .sb-foot .ph { width: 34px; height: 34px; border-radius: var(--r-pill); object-fit: cover; flex: none; }
.sb-foot .ph { background: var(--navy-600); display: grid; place-items: center; font-weight: 700; color: #fff; font-size: 13px; }
.sb-foot .meta { line-height: 1.3; overflow: hidden; }
.sb-foot .meta span { color: #fff; font-size: 13px; font-weight: 600; display: block; }
.sb-foot .meta small { color: var(--text-on-dark-muted); font-size: 11px; }

/* ---- Main ---- */
.main { display: flex; flex-direction: column; min-width: 0; }
.topbar { background: var(--bg-surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px; padding: 14px 28px; position: sticky; top: 0; z-index: 20; }
.topbar h2 { font-size: 17px; font-weight: 600; white-space: nowrap; }
.search { flex: 1; max-width: 460px; position: relative; }
.search input { width: 100%; border: 1px solid var(--border); border-radius: var(--r-md);
  padding: 9px 12px 9px 36px; font-size: 13px; background: var(--gray-50); color: var(--text-primary); }
.search input::placeholder { color: var(--text-muted); }
.search input:focus { outline: none; border-color: var(--blue-500); background: #fff; box-shadow: 0 0 0 3px var(--blue-50); }
.search svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 16px; height: 16px; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
.toggle-pill { display: flex; align-items: center; gap: 8px; background: var(--blue-50); color: var(--blue-700);
  border: 1px solid var(--blue-100); border-radius: var(--r-pill); padding: 6px 12px; font-size: 12.5px; font-weight: 600; }
.toggle-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success-500); }
.icon-btn { width: 36px; height: 36px; border-radius: var(--r-md); border: 1px solid var(--border); background: #fff;
  display: grid; place-items: center; color: var(--text-secondary); }
.icon-btn:hover { background: var(--gray-50); }
.topbar-ava { width: 36px; height: 36px; border-radius: var(--r-pill); object-fit: cover; }

.content { padding: 28px; overflow-y: auto; }

/* ============================ PRIMITIVES ============================ */
.btn { display: inline-flex; align-items: center; gap: 7px; border-radius: var(--r-md); font-weight: 600;
  font-size: 13px; padding: 9px 16px; border: 1px solid transparent; transition: background .12s, border-color .12s; }
.btn-primary { background: var(--navy-800); color: #fff; }
.btn-primary:hover { background: var(--navy-700); }
.btn-accent { background: var(--blue-600); color: #fff; }
.btn-accent:hover { background: var(--blue-700); }
.btn-ghost { background: #fff; color: var(--text-primary); border-color: var(--border-strong); }
.btn-ghost:hover { background: var(--gray-50); }
.btn-sm { padding: 6px 11px; font-size: 12px; }

.card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--shadow-xs); }
.card-pad { padding: 20px; }

.badge { display: inline-flex; align-items: center; gap: 5px; border-radius: var(--r-pill);
  padding: 3px 10px; font-size: 12px; font-weight: 600; }
.badge .dot { width: 7px; height: 7px; border-radius: 50%; }
.badge-green { background: var(--success-50); color: var(--success-600); }
.badge-amber { background: var(--warning-50); color: var(--warning-600); }
.badge-red   { background: var(--danger-50); color: var(--danger-600); }
.badge-gray  { background: var(--gray-100); color: var(--gray-600); }
.badge-blue  { background: var(--blue-50); color: var(--blue-700); }
.badge-blue .dot  { background: var(--blue-500); }
.badge-green .dot { background: var(--success-500); }
.badge-amber .dot { background: var(--warning-500); }
.badge-red .dot   { background: var(--danger-500); }
.badge-gray .dot  { background: var(--gray-400); }

.ph-token { color: var(--blue-600); font-weight: 600; }

/* segmented control + inputs (global so all screens/modal share) */
.seg { display: inline-flex; background: var(--gray-100); border-radius: var(--r-md); padding: 3px; }
.seg button { border: none; background: none; padding: 7px 16px; border-radius: var(--r-sm); font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer; white-space: nowrap; }
.seg button.active { background: var(--blue-500); color: #fff; }
.ipt { width: 100%; border: 1px solid var(--border-strong); border-radius: var(--r-md); padding: 9px 12px; font-size: 13px; font-family: inherit; color: var(--text-primary); background: #fff; }
.ipt:focus { outline: none; border-color: var(--blue-500); box-shadow: 0 0 0 3px var(--blue-50); }

/* data tables (global, consistent across screens) */
.tbl { width: 100%; border-collapse: collapse; }
.tbl thead th { text-align: left; font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: var(--text-secondary); font-weight: 600; padding: 12px 16px; }
.tbl tbody td { padding: 14px 16px; border-top: 1px solid var(--border); font-size: 13.5px; vertical-align: middle; }
.tbl tbody tr:hover { background: var(--gray-50); }
.kpi .cap { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
.fieldgrid { display: grid; grid-template-columns: repeat(3, 1fr); column-gap: 32px; }
@media (max-width: 1100px) { .fieldgrid { grid-template-columns: repeat(2, 1fr); } }

/* page heading */
.page-head { margin-bottom: 22px; }
.page-head h1 { font-size: var(--h2); }
.page-head p { color: var(--text-secondary); margin: 6px 0 0; font-size: 14px; max-width: 720px; }
.breadcrumb { display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--text-muted); margin-bottom: 10px; }
.breadcrumb b { color: var(--text-secondary); font-weight: 600; }

/* chart placeholder slot */
.chart-ph { position: relative; border-radius: var(--r-md); background:
  repeating-linear-gradient(135deg, var(--gray-100), var(--gray-100) 10px, var(--gray-50) 10px, var(--gray-50) 20px);
  border: 1px dashed var(--border-strong); display: grid; place-items: center; }
.chart-ph .lbl { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px;
  color: var(--text-muted); background: #fff; border: 1px solid var(--border); border-radius: var(--r-sm); padding: 4px 9px; }

/* ============================ DASHBOARD ============================ */
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 16px; }
.kpi { padding: 18px; }
.kpi .label { font-size: 12px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
.kpi .val { font-size: 30px; font-weight: 700; margin-top: 8px; letter-spacing: -.02em; }
.kpi .delta { font-size: 12px; font-weight: 600; margin-top: 6px; display: inline-flex; align-items: center; gap: 4px; }
.kpi .delta.up { color: var(--success-600); }
.kpi .delta.down { color: var(--danger-600); }
.dash-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
.dash-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 16px; }
.panel-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.panel-head h3 { font-size: 15px; font-weight: 600; }
.panel-head .sub { font-size: 12px; color: var(--text-muted); }

@media (max-width: 1180px) {
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .dash-grid, .dash-grid-3 { grid-template-columns: 1fr; }
}
@media (max-width: 920px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}

/* stub panel */
.stub { display: grid; place-items: center; padding: 80px 20px; text-align: center; }
.stub .chart-ph { width: 100%; max-width: 640px; height: 280px; }
.stub h3 { margin-bottom: 6px; }
.stub p { color: var(--text-secondary); max-width: 440px; }
</style>
</head>
<body>
<div class="app">
  <!-- ================= SIDEBAR ================= -->
  <aside class="sidebar">
    <div class="sb-logo">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M20.5 8.5A9 9 0 1 0 21 13" stroke="#59ABF0" stroke-width="2.6" stroke-linecap="round"/>
        <path d="M20.8 3.6 21.4 9 16 8.2z" fill="#59ABF0"/>
      </svg>
      <b>RetainOS</b>
    </div>

    <div class="sb-context">
      <span class="ava">AI</span>
      <span class="meta"><small>SaaS Client</small><span>Acme Inc</span></span>
      <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>

    <nav class="sb-nav" id="nav">
      <button class="sb-item" data-route="dashboard">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 13h8V3H3v10Zm0 8h8v-6H3v6Zm10 0h8V11h-8v10Zm0-18v6h8V3h-8Z" fill="currentColor"/></svg>
        Dashboard</button>
      <button class="sb-item" data-route="clients">
        <svg viewBox="0 0 24 24" fill="none"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm13 10v-2a4 4 0 0 0-3-3.87M16 3.13A4 4 0 0 1 16 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Clients <span class="count">154</span></button>
      <button class="sb-item" data-route="reports">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 3v18h18M7 14l3-3 3 3 5-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        CSM Reports</button>
      <button class="sb-item" data-route="tasks">
        <svg viewBox="0 0 24 24" fill="none"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Tasks <span class="count">8</span></button>
      <button class="sb-item" data-route="saas">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4M9 9h0M9 13h0M9 17h0" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        SaaS Clients</button>

      <div class="sb-section">Dev Tools</div>
      <button class="sb-item" data-route="tables" data-title="Tables">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 9h18M3 15h18M9 3v18M4 3h16a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
        Tables</button>
      <button class="sb-item" data-route="synclog" data-title="Sync Log">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 1 0 3-6.7L3 8m0-5v5h5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Sync Log</button>
    </nav>

    <div class="sb-foot">
      <span class="ph">FN</span>
      <span class="meta"><span>{FirstName}</span><small>example@example.com</small></span>
    </div>
  </aside>

  <!-- ================= MAIN ================= -->
  <div class="main">
    <header class="topbar">
      <h2 id="topbar-title">Welcome back, <span class="ph-token">{FirstName}</span></h2>
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m20 20-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input type="text" placeholder="Search for clients, tasks and SaaS companies" />
      </div>
      <div class="topbar-right">
        <span class="toggle-pill"><span class="dot"></span> View as active</span>
        <button class="icon-btn" title="Notifications">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <a href="Login.html" title="Sign out"><img class="topbar-ava" src="https://i.pravatar.cc/72?img=12" alt="" /></a>
      </div>
    </header>

    <main class="content" id="content"><!-- routed --></main>
  </div>
</div>

<script src="screens.js"></script>
</body>
</html>
